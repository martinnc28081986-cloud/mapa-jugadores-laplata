<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

  #header {
    background: #1a3a5c; color: white;
    padding: 10px 16px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0;
  }
  #header h1 { font-size: 16px; font-weight: 600; }
  #header-stats { font-size: 11px; opacity: 0.8; }

  #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  #sidebar {
    width: 285px; background: white;
    border-right: 1px solid #ddd;
    display: flex; flex-direction: column;
    flex-shrink: 0; overflow: hidden;
  }

  #sidebar-header { padding: 10px 12px; border-bottom: 1px solid #eee; background: #f8f9fa; }
  #sidebar-header h2 { font-size: 13px; color: #333; margin-bottom: 8px; }

  .league-row {
    display: flex; align-items: center; gap: 7px;
    padding: 3px 2px; cursor: pointer; user-select: none;
    font-size: 11px; color: #333;
  }
  .league-row input[type=checkbox] { cursor: pointer; margin: 0; }
  .ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .lname { font-weight: 600; }
  .lcount { color: #888; margin-left: auto; font-size: 10px; }

  #search-box {
    width: 100%; padding: 6px 9px; border: 1px solid #ddd;
    border-radius: 5px; font-size: 12px; margin-top: 8px;
  }
  #search-box:focus { outline: none; border-color: #1a3a5c; }

  #club-list { flex: 1; overflow-y: auto; padding: 6px; }

  .club-card {
    background: white; border: 1px solid #e0e0e0;
    border-radius: 6px; padding: 7px 10px; margin-bottom: 5px;
    cursor: pointer; border-left: 3px solid #ccc;
    transition: background 0.12s;
  }
  .club-card:hover { background: #f5f8ff; }
  .club-card.no-geo { opacity: 0.55; cursor: default; }
  .club-card.no-geo:hover { background: white; }
  .cname { font-size: 12px; font-weight: 600; color: #222; }
  .caddr { font-size: 10px; color: #888; margin-top: 1px; }
  .cmeta { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; white-space: nowrap; }
  .badge-liga { background: #e8f4fd; color: #1a6a9a; }
  .badge-fund { background: #fdecea; color: #c0392b; font-weight: 700; }
  .badge-nogeo { background: #f5f5f5; color: #aaa; }

  #geo-bar {
    padding: 5px 12px; background: #fffbea;
    border-top: 1px solid #f0e68c;
    font-size: 10px; color: #888; flex-shrink: 0;
  }
  #geo-bar.hidden { display: none; }

  #stats-bar {
    display: flex; padding: 6px 8px;
    border-top: 1px solid #eee; background: #f8f9fa;
    flex-shrink: 0; gap: 2px;
  }
  .stat { text-align: center; flex: 1; padding: 2px; }
  .stat .n { font-size: 13px; font-weight: 700; }
  .stat .l { font-size: 9px; color: #888; }

  #map-container { flex: 1; position: relative; }
  #map { height: 100%; width: 100%; }

  /* Modal */
  #modal-overlay {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45); z-index: 3000;
    align-items: center; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: white; border-radius: 10px;
    padding: 20px 22px; width: 330px; max-width: 95%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.22);
  }
  #modal-liga-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 10px; color: white; margin-bottom: 6px;
  }
  #modal-name { font-size: 16px; font-weight: 700; color: #1a3a5c; margin-bottom: 4px; }
  #modal-addr { font-size: 12px; color: #777; margin-bottom: 14px; }

  .fund-box {
    border: 2px solid #e74c3c; border-radius: 8px;
    padding: 11px 14px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: background 0.15s; margin-bottom: 14px;
    background: white;
  }
  .fund-box.active { background: #fdecea; }
  .fund-flag { font-size: 26px; line-height: 1; }
  .fund-txt { font-size: 12px; color: #444; line-height: 1.5; }
  .fund-txt strong { color: #c0392b; display: block; font-size: 13px; }

  .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 2px; }
  .btn { padding: 7px 16px; border-radius: 5px; font-size: 13px; cursor: pointer; border: none; font-weight: 500; }
  .btn-primary { background: #1a3a5c; color: white; }
  .btn-primary:hover { background: #0f2640; }
  .btn-secondary { background: #f0f0f0; color: #444; }
  .btn-secondary:hover { background: #e0e0e0; }

  /* Mobile */
  #toggle-sidebar-btn {
    display: none; position: absolute; top: 10px; left: 10px;
    z-index: 1000; background: #1a3a5c; color: white; border: none;
    border-radius: 6px; width: 38px; height: 38px; font-size: 18px;
    cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    align-items: center; justify-content: center;
  }
  @media (max-width: 600px) {
    #toggle-sidebar-btn { display: flex; }
    #sidebar {
      position: absolute; top: 0; left: 0; height: 100%;
      z-index: 900; transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    #sidebar.open { transform: translateX(0); }
    #map-container { width: 100%; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>⚽ Ligas Infantiles — La Plata</h1>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
    <span id="header-stats">Cargando…</span>
    <span id="sync-status" style="font-size:10px;opacity:0.75">🔄 Conectando…</span>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Filtrar por liga</h2>
      <div id="league-toggles"></div>
      <input type="text" id="search-box" placeholder="🔍 Buscar club…" oninput="renderList()">
    </div>
    <div id="club-list"></div>
    <div id="geo-bar">⏳ Geocodificando… <span id="geo-progress"></span></div>
    <div id="stats-bar">
      <div class="stat"><div class="n" id="st-total">0</div><div class="l">Total</div></div>
      <div class="stat"><div class="n" id="st-geo" style="color:#27ae60">0</div><div class="l">En mapa</div></div>
      <div class="stat"><div class="n" id="st-fund" style="color:#e74c3c">0</div><div class="l">Fundación</div></div>
    </div>
  </div>

  <div id="map-container">
    <button id="toggle-sidebar-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" title="Panel">☰</button>
    <div id="map"></div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div id="modal-liga-badge"></div>
    <div id="modal-name"></div>
    <div id="modal-addr"></div>
    <div class="fund-box" id="fund-box" onclick="toggleFundacion()">
      <div class="fund-flag">🚩</div>
      <div class="fund-txt">
        <strong>Fundación Estudiantes</strong>
        <span id="fund-status-txt">Clic para marcar como integrante</span>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="closeModal()">Guardar</button>
    </div>
  </div>
</div>

// ── Firebase ──────────────────────────────────────────

function setSyncStatus(txt) {
  document.getElementById('sync-status').textContent = txt;
}

// Guarda fundacion en Firebase + localStorage de respaldo
function saveFundacion() {
  const arr = [...fundacion];
  try { localStorage.setItem('ligas_lp_fund_backup', JSON.stringify(arr)); } catch(e) {}
  db.ref('fundacion').set(arr).catch(() => setSyncStatus('⚠️ Sin conexión'));
}

// Guarda geo cache en Firebase (para compartir con otros dispositivos)
function saveGeoCacheToFirebase() {
  try { db.ref('geoCache').set(JSON.stringify(geoCache)); } catch(e) {}
  try { localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(geoCache)); } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// INICIALIZAR — carga desde Firebase
// ═══════════════════════════════════════════════════════
function initFirebase() {
  setSyncStatus('🔄 Conectando…');

  // Leer geo cache de Firebase primero
  db.ref('geoCache').once('value').then(snap => {
    const raw = snap.val();
    if (raw) {
      try { geoCache = JSON.parse(raw); } catch(e) {}
    }
    // Aplicar geo a clubs
    clubs.forEach(c => {
      if (c.dir && geoCache[c.dir]) {
        c.lat = geoCache[c.dir].lat;
        c.lng = geoCache[c.dir].lng;
      }
    });

    // Ahora cargar fundacion con listener en tiempo real
    db.ref('fundacion').on('value', snapshot => {
      const data = snapshot.val();
      if (data !== null) {
        fundacion = new Set(data);
      } else {
        // Primera vez — escribir defaults
        fundacion = new Set(DEFAULT_FUNDACION);
        saveFundacion();
      }
      setSyncStatus('✅ Sincronizado');
      refreshAllMarkers();
      renderList();
      renderStats();

      // Actualizar modal si está abierto
      if (modalClub) {
        const isFund = fundacion.has(modalClub.id);
        document.getElementById('fund-box').classList.toggle('active', isFund);
        document.getElementById('fund-status-txt').textContent = isFund
          ? '✅ Integrante de la Fundación. Clic para quitar.'
          : 'Clic para marcar como integrante de la Fundación.';
      }
    });

    // Iniciar geocodificación (solo agrega coords faltantes)
    geocodeAll();

  }).catch(err => {
    console.error('Firebase error:', err);
    setSyncStatus('⚠️ Sin conexión — modo local');
    // Fallback a localStorage
    try {
      const saved = localStorage.getItem('ligas_lp_fund_backup');
      fundacion = saved ? new Set(JSON.parse(saved)) : new Set(DEFAULT_FUNDACION);
    } catch(e) { fundacion = new Set(DEFAULT_FUNDACION); }
    clubs.forEach(c => {
      if (c.dir && geoCache[c.dir]) { c.lat = geoCache[c.dir].lat; c.lng = geoCache[c.dir].lng; }
    });
    refreshAllMarkers();
    renderList();
    renderStats();
    geocodeAll();
  });
}

function saveState() {
  saveFundacion();
  try { localStorage.setItem(VISIBLE_KEY, JSON.stringify([...visibleLeagues])); } catch(e) {}
}

function saveGeoCache() {
  saveGeoCacheToFirebase();
}

// ═══════════════════════════════════════════════════════
// MAPA
// ═══════════════════════════════════════════════════════
function initMap() {
  map = L.map('map').setView([-34.921, -57.955], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);
}

function makeIcon(liga, isFund) {
  const color = LEAGUES[liga]?.color || '#888';
  const flagLayer = isFund
    ? `<rect x="18" y="2" width="9" height="6" fill="#e53935" rx="1"/>
       <rect x="18" y="8" width="9" height="6" fill="white" stroke="#ddd" stroke-width="0.5" rx="1"/>
       <line x1="18" y1="2" x2="18" y2="14" stroke="#555" stroke-width="1"/>`
    : '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
    <path d="M14 0C6.3 0 0 6.3 0 14c0 9.7 14 24 14 24S28 23.7 28 14C28 6.3 21.7 0 14 0z" fill="${color}" opacity="0.95"/>
    <circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>
    ${flagLayer}
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [28, 38], iconAnchor: [14, 38], popupAnchor: [0, -40] });
}

function addMarker(club) {
  if (!club.lat || !club.lng) return;
  if (club._marker) { try { map.removeLayer(club._marker); } catch(e){} }
  if (!visibleLeagues.has(club.liga)) { club._marker = null; return; }

  const isFund = fundacion.has(club.id);
  const L_info = LEAGUES[club.liga];
  const m = L.marker([club.lat, club.lng], { icon: makeIcon(club.liga, isFund) }).addTo(map);
  m.bindPopup(() => {
    const fBadge = isFund ? `<br><span style="color:#e53935;font-size:11px;font-weight:700">🚩 Fundación Estudiantes</span>` : '';
    return `<b style="font-size:13px">${club.nombre}</b>
      <br><span style="font-size:11px;color:${L_info.color};font-weight:600">${L_info.label}</span>
      <br><span style="font-size:11px;color:#666">${club.dir || ''}</span>
      ${fBadge}
      <br><a href="#" onclick="openModal('${club.id}');return false;" style="font-size:11px;color:#1a3a5c">✏️ Ver / editar</a>`;
  });
  m.on('click', () => {});
  club._marker = m;
}

function refreshAllMarkers() {
  clubs.forEach(c => addMarker(c));
}

// ═══════════════════════════════════════════════════════
// GEOCODING
// ═══════════════════════════════════════════════════════
let geoQueue = [];
let geoRunning = false;

function geocodeAll() {
  const toGeo = clubs.filter(c => c.dir && !geoCache[c.dir]);
  if (toGeo.length === 0) {
    applyGeoResults();
    return;
  }
  document.getElementById('geo-bar').classList.remove('hidden');
  geoQueue = [...toGeo];
  runGeoQueue();
}

function runGeoQueue() {
  if (geoRunning) return;
  if (geoQueue.length === 0) {
    saveGeoCache();
    applyGeoResults();
    document.getElementById('geo-bar').classList.add('hidden');
    return;
  }
  geoRunning = true;
  const club = geoQueue.shift();
  const done = clubs.filter(c => c.dir).length - geoQueue.length;
  const total = clubs.filter(c => c.dir).length;
  document.getElementById('geo-progress').textContent = `${done}/${total} — ${club.nombre}`;

  const q = encodeURIComponent(club.dir);
  fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=ar`, {
    headers: { 'Accept-Language': 'es', 'User-Agent': 'MapaLigasLaPlata/1.0' }
  })
  .then(r => r.json())
  .then(data => {
    if (data && data.length > 0) {
      geoCache[club.dir] = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
    } else {
      geoCache[club.dir] = null; // mark as failed
    }
    geoRunning = false;
    applyGeoSingle(club);
    setTimeout(runGeoQueue, 1100); // Nominatim: max 1 req/sec
  })
  .catch(() => {
    geoCache[club.dir] = null;
    geoRunning = false;
    setTimeout(runGeoQueue, 1100);
  });
}

function applyGeoResults() {
  clubs.forEach(c => {
    if (c.dir && geoCache[c.dir]) {
      c.lat = geoCache[c.dir].lat;
      c.lng = geoCache[c.dir].lng;
    }
  });
  refreshAllMarkers();
  renderList();
  renderStats();
}

function applyGeoSingle(club) {
  if (club.dir && geoCache[club.dir]) {
    club.lat = geoCache[club.dir].lat;
    club.lng = geoCache[club.dir].lng;
    addMarker(club);
  }
  renderList();
  renderStats();
}

// ═══════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════
function renderLeagueToggles() {
  const div = document.getElementById('league-toggles');
  div.innerHTML = '';
  Object.entries(LEAGUES).forEach(([key, lg]) => {
    const count = clubs.filter(c => c.liga === key).length;
    const row = document.createElement('label');
    row.className = 'league-row';
    row.innerHTML = `
      <input type="checkbox" ${visibleLeagues.has(key) ? 'checked' : ''} onchange="toggleLeague('${key}', this.checked)">
      <span class="ldot" style="background:${lg.color}"></span>
      <span class="lname">${lg.label}</span>
      <span class="lcount">${count}</span>`;
    div.appendChild(row);
  });
}

function toggleLeague(key, checked) {
  if (checked) visibleLeagues.add(key); else visibleLeagues.delete(key);
  saveState();
  refreshAllMarkers();
  renderList();
  renderStats();
}

function renderList() {
  const list = document.getElementById('club-list');
  const q = document.getElementById('search-box').value.trim().toLowerCase();
  list.innerHTML = '';

  const filtered = clubs.filter(c => {
    if (!visibleLeagues.has(c.liga)) return false;
    if (q && !c.nombre.toLowerCase().includes(q) && !(c.dir||'').toLowerCase().includes(q)) return false;
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:12px">Sin resultados</div>';
    return;
  }

  filtered.forEach(c => {
    const isFund = fundacion.has(c.id);
    const hasGeo = !!c.lat;
    const L_info = LEAGUES[c.liga];
    const card = document.createElement('div');
    card.className = 'club-card' + (hasGeo ? '' : ' no-geo');
    card.style.borderLeftColor = L_info.color;
    card.innerHTML = `
      <div class="cname">${c.nombre}</div>
      <div class="caddr">${c.dir || '<em>Sin sede definida</em>'}</div>
      <div class="cmeta">
        <span class="badge badge-liga" style="background:${L_info.color}22;color:${L_info.color}">${L_info.label}</span>
        ${isFund ? '<span class="badge badge-fund">🚩 Fundación</span>' : ''}
        ${!hasGeo ? '<span class="badge badge-nogeo">Sin geolocalizar</span>' : ''}
      </div>`;
    if (hasGeo) {
      card.onclick = () => {
        map.setView([c.lat, c.lng], 16);
        if (c._marker) c._marker.openPopup();
        openModal(c.id);
        document.getElementById('sidebar').classList.remove('open');
      };
    } else {
      card.onclick = () => openModal(c.id);
    }
    list.appendChild(card);
  });
}

function renderStats() {
  const vis = clubs.filter(c => visibleLeagues.has(c.liga));
  document.getElementById('st-total').textContent = vis.length;
  document.getElementById('st-geo').textContent = vis.filter(c => c.lat).length;
  document.getElementById('st-fund').textContent = [...fundacion].filter(id => {
    const c = clubs.find(x => x.id === id);
    return c && visibleLeagues.has(c.liga);
  }).length;
  const total = clubs.length;
  document.getElementById('header-stats').textContent = `${total} clubes · ${Object.keys(LEAGUES).length} ligas`;
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal(id) {
  const c = clubs.find(x => x.id === id);
  if (!c) return;
  modalClub = c;
  const L_info = LEAGUES[c.liga];
  const isFund = fundacion.has(c.id);

  const badge = document.getElementById('modal-liga-badge');
  badge.textContent = L_info.label;
  badge.style.background = L_info.color;

  document.getElementById('modal-name').textContent = c.nombre;
  document.getElementById('modal-addr').textContent = c.dir || 'Sin sede definida';

  const box = document.getElementById('fund-box');
  box.classList.toggle('active', isFund);
  document.getElementById('fund-status-txt').textContent = isFund
    ? '✅ Integrante de la Fundación. Clic para quitar.'
    : 'Clic para marcar como integrante de la Fundación.';

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalClub = null;
}

function toggleFundacion() {
  if (!modalClub) return;
  if (fundacion.has(modalClub.id)) {
    fundacion.delete(modalClub.id);
  } else {
    fundacion.add(modalClub.id);
  }
  saveState();

  // Refresh marker
  addMarker(modalClub);

  const isFund = fundacion.has(modalClub.id);
  document.getElementById('fund-box').classList.toggle('active', isFund);
  document.getElementById('fund-status-txt').textContent = isFund
    ? '✅ Integrante de la Fundación. Clic para quitar.'
    : 'Clic para marcar como integrante de la Fundación.';

  renderList();
  renderStats();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

try {
  const v = JSON.parse(localStorage.getItem(VISIBLE_KEY) || 'null');

} catch(e) {}

initMap();
renderLeagueToggles();
renderList();
renderStats();
